repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 'v5.0.0'
    hooks:
    -   id: check-toml
    -   id: check-yaml
    -   id: check-json
    -   id: end-of-file-fixer
        exclude: '\.po$|\.pot$'
    -   id: trailing-whitespace
        exclude: '\.po$|\.pot$'
    -   id: requirements-txt-fixer
